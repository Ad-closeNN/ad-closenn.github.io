<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <link rel="icon" href="../resources/tips.svg" type="image/x-icon">
    <title>确认跳转</title>
    <style>
        button {
            padding: 0;
            font-family: inherit;
            background: none;
            border: none;
            outline: none;
            cursor: pointer;
        }

        .button {
            display: inline-block;
            padding: 10px 16px;
            color: #fff;
            font-size: 14px;
            line-height: 1;
            background-color: #0077d9;
            border-radius: 3px;
        }

        .logo,
        .wrapper {
            margin: auto;
            padding-left: 30px;
            padding-right: 30px;
            max-width: 540px;
        }

        .wrapper {
            padding-top: 25px;
            padding-bottom: 25px;
            background-color: #f7f7f7;
            border: 1px solid #babbbc;
            border-radius: 5px;
        }

        .link {
            margin-top: 12px;
            word-wrap: normal;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .link.is-expanded {
            word-wrap: break-word;
            white-space: normal;
        }

        .actions {
            margin-top: 15px;
            padding-top: 30px;
            text-align: right;
            border-top: 1px solid #d8d8d8;
        }

        .actions .link-button + .link-button {
            margin-left: 30px;
        }
            /* 使用CSS样式控制按钮布局 */
        .powered-by {
            position: absolute;
            top: 10px; /* 距离顶部的距离 */
            right: 10px; /* 距离右侧的距离 */
            color: gray; /* 文字颜色 */
            font-size: 12px; /* 文字大小 */
        }
        .made-by {
            position: absolute;
            top: 30px; /* 距离顶部的距离 */
            right: 10px; /* 距离右侧的距离 */
            color: gray; /* 文字颜色 */
            font-size: 12px; /* 文字大小 */
        }
        </style>
</style>
</head>
<body>
    <div class="powered-by">Powered by GitHub Pages</div>
    <div class="made-by">Made by Ad_closeNN</div>
<div class="wrapper">
    <div class="content">
        <h1>即将离开，前往 empty</h1>
        <p style="display:inline;" class="info">您即将离开，请注意您的周围环境。<div style="font-size:small;color:red;display:inline"><strong>No Safe For Work!</strong><div></p>
        <p class="link" style="font-size:small;color:gray">https://ad-closenn.github.io/empty</p>
    </div>
    <div class="actions">
        <a class="button" style="text-decoration:none;" href="https://ad-closenn.github.io/empty">继续访问</a>
    </div>
</div>

</script>
</body>
</html>
